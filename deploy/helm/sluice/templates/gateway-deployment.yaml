apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app: sluice-gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: sluice-gateway
  template:
    metadata:
      labels:
        app: sluice-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.gateway.metricsPort }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - -listen=:{{ .Values.gateway.listenPort }}
            - -metrics-addr=:{{ .Values.gateway.metricsPort }}
            - -workers={{ .Values.gateway.workers }}
            - -queue={{ .Values.gateway.queue }}
            - -sink=kafka
            - -brokers={{ .Values.dataInfra.hostGatewayIP }}:{{ .Values.dataInfra.kafkaPort }}
            - -topic={{ .Values.kafka.topic }}
          ports:
            - containerPort: {{ .Values.gateway.listenPort }}
              name: grpc
            - containerPort: {{ .Values.gateway.metricsPort }}
              name: metrics
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app: sluice-gateway
spec:
  selector:
    app: sluice-gateway
  ports:
    - name: grpc
      port: {{ .Values.gateway.listenPort }}
      targetPort: {{ .Values.gateway.listenPort }}
    - name: metrics
      port: {{ .Values.gateway.metricsPort }}
      targetPort: {{ .Values.gateway.metricsPort }}
