services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: sluice-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_SEGMENT_DELETE_DELAY_MS: "1000"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      CLUSTER_ID: "sluice-kraft-cluster-1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    mem_limit: 900m
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: sluice-redis
    ports:
      - "6379:6379"
    mem_limit: 200m
    profiles: ["phase2", "phase3", "phase4"]

  timescaledb:
    image: timescale/timescaledb:2.15.2-pg16
    container_name: sluice-timescaledb
    environment:
      POSTGRES_USER: sluice
      POSTGRES_PASSWORD: sluice
      POSTGRES_DB: sluice
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    mem_limit: 600m
    shm_size: 128mb
    profiles: ["phase2", "phase3", "phase4"]

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sluice-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 300m
    profiles: ["phase3", "phase4"]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: sluice-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: sluice
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    mem_limit: 300m
    profiles: ["phase3", "phase4"]

volumes:
  kafka-data:
  timescale-data:
